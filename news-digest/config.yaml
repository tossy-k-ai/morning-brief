    category: "domestic_intl"
    enabled: true
    max_items: 10
    note: "morning-brief実装時 (2026-07-22) に生存確認済み: entries=50。"

  - name: "ITmedia (AI+)"
    url: "https://rss.itmedia.co.jp/rss/2.0/aiplus.xml"
    category: "ai_tech"
    enabled: true
    max_items: 10
    note: "morning-brief実装時 (2026-07-22) にdiscover機能で生存確認済み。"

  - name: "ITmedia ビジネスオンライン"
    url: "https://rss.itmedia.co.jp/rss/2.0/business.xml"
