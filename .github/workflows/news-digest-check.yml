name: news-digest RSS check

# news-digest は Windows タスクスケジューラでローカル実行する前提のプロジェクトです。
# このワークフローは cron を持たず、RSSソースの生存確認だけを手動実行で行うための
# 検証ユーティリティです（本番の配信処理はここでは実行しません）。
on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-digest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check RSS feed liveness
        run: python check_feeds.py
