name: Morning News Digest

on:
  schedule:
    # 毎日 07:00 JST = 22:00 UTC。負荷時は数分〜十数分遅れる、稀にスキップされることがある。
    - cron: '0 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check RSS feed liveness (informational)
        continue-on-error: true
        run: python check_feeds.py --discover

      - name: Run digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: Keep repository active (avoid the 60-day cron auto-disable)
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          if ! git diff --cached --quiet; then
            git commit -m "chore: update last_run.txt [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
